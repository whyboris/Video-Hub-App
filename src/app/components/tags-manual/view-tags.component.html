@for (tag of _tags; track tag) {

<div
  class="singleTag"
>

@if (tag.removable) {
  <span
    class="coverTheX"
    [ngClass]="{ 'coverTheX-dark': darkMode }"
  >
    &ensp;
  </span>
}

  <span
    class="search-or-tag-general tag"
    [ngClass]="{ 'tag-draggable': draggable }"
    [ngStyle]="{
      background: tag.colour,
      color: tag.colour ? getContrastColor(tag.colour) : undefined
    }"
    (click)="tagClick(tag, $event)"
    (contextmenu)="onTagRightClick($event, tag)"
    [draggable]='draggable'
    (dragstart)="dragStart($event)"
  >
    {{ tag.name }}
  </span>

@if (displayFrequency) {
  <span
    class="search-or-tag-general tag frequency"
  >
    {{ tagService.tagsMap.get(tag.name) }}
  </span>
}

@if (tag.removable) {
  <app-icon [icon]="'icon-close'" class="remove-tag" (click)="removeTag(tag.name)" />
}

</div>

} <!-- end of @for -->

@if (draggable) {

<div style="transform: translate(-100px, -100px)">
  <span #dragHack class="search-or-tag-general tag special">
    hack tag
  </span>
</div>

}
