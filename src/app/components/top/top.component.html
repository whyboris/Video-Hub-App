@if (_file !== '') {
<div
  class="folder-container"
  [ngClass]="{ 'dark-mode-override': darkMode }"
>
  <app-icon class="icon" [icon]="'icon-folder-blank'" (click)="openInExplorer()" />

@for (item of folderNameArray; track $index) {
  <span
    (click)="folderWordClicked(item)"
    class="folder-word"
  >
    {{ item }}
  </span>
}

</div>

<div
  class="file-container"
  [ngClass]="{ 'dark-mode-override': darkMode }"
>
  <app-icon class="icon" [icon]="'icon-video-blank'" (click)="openInExplorer()" />

@for (item of fileNameArray; track $index) {
  <span
    (click)="fileWordClicked(item)"
    class="file-word"
  >
    {{ item }}
  </span>
}

</div>

}
