@if (settingsButtons['showRecent'].toggled) {

<div
  [ngStyle]="{ color: settingsButtons['darkMode'].toggled ? '#aaaaaa' : '#333333' }"
  class="recently-opened"
>
  <span class="recently-opened-label">
    {{ 'SIDEBAR.recentlyOpened' | translate }}
  </span>
  <ul>

  @for (historyItem of vhaFileHistory(); track historyItem; let i = $index) {
    <li
      (click)="openFromHistory.emit(i)"
      class="recently-opened-item"
      [ngClass]="{ 'current-open': i === 0 }"
    >
      {{ historyItem.hubName }}
    </li>
  }

  </ul>
</div>

}
