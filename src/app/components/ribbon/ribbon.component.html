@for (btnGroup of settingsButtonsGroups(); track btnGroup; let i = $index) {

  <div class="settings-buttons-group">

  @for (buttonKey of btnGroup; track buttonKey) {

    @if (!settingsButtons[buttonKey].hidden && settingsButtons[buttonKey].iconName) {
      <button
        (click)="toggleButton.emit(buttonKey)"
        [ngClass]="settingsButtons[buttonKey].toggled | buttonStylePipe : settingsButtons['darkMode'].toggled
                                                                        : settingsButtons['flatIcons'].toggled"
        title="{{ settingsButtons[buttonKey].title | translate }}"
        @buttonAnimation
      >
        <app-icon class="icon" [icon]="settingsButtons[buttonKey].iconName" />
      </button>
    }

  }

  </div>

}
